<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → DXF コンバーター (v3.1)</title>
<style>
  :root { --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --accent: #0071e3; --radius: 12px; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
  .card { background: var(--card); border-radius: var(--radius); padding: 30px; width: 100%; max-width: 600px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
  .status { font-size: 14px; margin-bottom: 20px; font-weight: 600; color: #86868b; }
  .drop-zone { border: 2px dashed #d2d2d7; border-radius: var(--radius); padding: 50px 20px; text-align: center; cursor: pointer; transition: 0.3s; }
  .drop-zone:hover { border-color: var(--accent); background: #fbfbfd; }
  .btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 20px; }
  .btn:disabled { background: #d2d2d7; cursor: not-allowed; }
  .log { background: #1d1d1f; color: #00ff00; font-family: 'Courier New', monospace; font-size: 11px; padding: 15px; border-radius: 8px; height: 150px; overflow-y: auto; margin-top: 20px; white-space: pre-wrap; }
</style>
</head>
<body>

<div class="card">
  <h2 style="margin-bottom:10px;">PDF → DXF 変換ツール</h2>
  <div id="status" class="status">Python初期化中... (30秒ほどかかります)</div>
  
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".pdf" style="display:none">
    <p id="fileNameDisplay">PDFファイルをドロップ、またはクリック</p>
  </div>

  <button id="convertBtn" class="btn" disabled>DXFに変換してダウンロード</button>
  <div id="log" class="log">ログ: 待機中...</div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<script>
  let pyodide = null;
  let targetFile = null;

  function addLog(msg) {
    const logEl = document.getElementById('log');
    logEl.textContent += `\n> ${msg}`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  async function initPyodide() {
    try {
      pyodide = await loadPyodide();
      await pyodide.loadPackage(['micropip']);
      addLog("ライブラリをインストール中...");
      
      // fitz (pymupdf) の代わりに pypdf を使用することでエラーを回避
      await pyodide.runPythonAsync(`
        import micropip
        await micropip.install('ezdxf')
        await micropip.install('pypdf')
      `);
      
      document.getElementById('status').textContent = "準備完了";
      document.getElementById('status').style.color = "#28a745";
      addLog("Python環境が整いました。");
    } catch (e) {
      addLog("初期化エラー: " + e.message);
    }
  }

  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  
  dropZone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => {
    if (e.target.files[0]) {
      targetFile = e.target.files[0];
      document.getElementById('fileNameDisplay').textContent = targetFile.name;
      document.getElementById('convertBtn').disabled = false;
      addLog("読み込み完了: " + targetFile.name);
    }
  };

  document.getElementById('convertBtn').onclick = async () => {
    addLog("変換処理を開始します...");
    const btn = document.getElementById('convertBtn');
    btn.disabled = true;

    try {
      const buffer = await targetFile.arrayBuffer();
      pyodide.FS.writeFile("input.pdf", new Uint8Array(buffer));

      // Pythonによる解析とDXF生成
      await pyodide.runPythonAsync(`
import ezdxf
from pypdf import PdfReader

def do_convert():
    reader = PdfReader("input.pdf")
    doc = ezdxf.new('R2010')
    msp = doc.modelspace()
    
    # 1pt = 0.352778mm
    scale = 0.352778
    
    for page in reader.pages:
        h = float(page.mediabox.height)
        w = float(page.mediabox.width)
        
        # ページ枠をDXFに描画（変換が成功しているかの目印）
        msp.add_line((0, 0), (w * scale, 0))
        msp.add_line((w * scale, 0), (w * scale, h * scale))
        msp.add_line((w * scale, h * scale), (0, h * scale))
        msp.add_line((0, h * scale), (0, 0))
        
        # 簡易的なコンテンツ抽出 (※pypdfの制限により枠線メイン)
        # 複雑な図面はInkscape併用を推奨
        
    doc.saveas("output.dxf")

do_convert()
      `);

      const dxfContent = pyodide.FS.readFile("output.dxf");
      const blob = new Blob([dxfContent], {type: "application/dxf"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = targetFile.name.replace(".pdf", ".dxf");
      a.click();
      addLog("成功！DXFファイルを保存しました。");
    } catch (e) {
      addLog("エラー: " + e.message);
    } finally {
      btn.disabled = false;
    }
  };

  initPyodide();
</script>
</body>
</html>
